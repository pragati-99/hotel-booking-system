# src/main/resources/application.properties

# ============================================
# SPRING BOOT CONFIGURATION
# ============================================
spring.application.name=hotel-management
server.port=8080
server.servlet.context-path=/

# ============================================
# DATABASE CONFIGURATION - hotelms
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/hotelms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION - FIXED (Secret must be at least 32 chars)
# ============================================
jwt.secret=HotelManagementSystemSecretKey2024ForJWTTokenGenerationMustBeAtLeast32Chars
jwt.expiration=86400000



